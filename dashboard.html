<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Urban Seasonal Intelligence System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="font-inter smooth-scroll">
    <!-- Animated Background -->
    <div class="fixed inset-0 -z-10 overflow-hidden bg-[#0a0a0f]">
        <div class="stars"></div>
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <!-- Header with Season Toggle -->
    <header class="fixed top-0 w-full z-50 glass-header">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="select.html" class="text-gray-400 hover:text-purple-400 transition-colors">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                </a>
                <div>
                    <h1 class="text-xl font-space font-bold text-white" id="cityName">Loading...</h1>
                    <p class="text-sm text-gray-400" id="analysisInfo">Preparing analysis...</p>
                </div>
            </div>
            
            <!-- Season Toggle -->
            <div class="season-toggle">
                <label class="text-sm text-gray-400 mr-3">Season:</label>
                <div class="season-dropdown">
                    <button type="button" id="seasonToggleBtn" class="season-toggle-btn">
                        <span id="currentSeasonText">Loading...</span>
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </button>
                    <div id="seasonDropdown" class="season-dropdown-menu hidden">
                        <button type="button" data-season="summer" class="season-option-btn">
                            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <circle cx="12" cy="12" r="5"/>
                                <line x1="12" y1="1" x2="12" y2="3"/>
                                <line x1="12" y1="21" x2="12" y2="23"/>
                                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                                <line x1="1" y1="12" x2="3" y2="12"/>
                                <line x1="21" y1="12" x2="23" y2="12"/>
                                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                            </svg>
                            Summer
                        </button>
                        <button type="button" data-season="monsoon" class="season-option-btn">
                            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"/>
                            </svg>
                            Monsoon
                        </button>
                        <button type="button" data-season="winter" class="season-option-btn">
                            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/>
                            </svg>
                            Winter
                        </button>
                        <button type="button" data-season="spring" class="season-option-btn">
                            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                            </svg>
                            Spring
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="pt-24 px-6 pb-12">
        <div class="max-w-7xl mx-auto">
            <!-- Loading State -->
            <div id="loadingState" class="text-center py-20">
                <div class="glass-card p-12 inline-block">
                    <h2 class="text-2xl font-space font-bold text-white mb-4">
                        Analyzing Seasonal Data
                    </h2>
                    <p class="text-gray-400 mb-6">
                        Fetching weather data and generating AI insights...
                    </p>
                    <div class="flex items-center justify-center gap-2 text-purple-400">
                        <div class="loading-spinner"></div>
                        <span>Processing...</span>
                    </div>
                </div>
            </div>

            <!-- Dashboard Content -->
            <div id="dashboardContent" class="hidden space-y-6">
                <!-- AI Insights Section -->
                <div class="glass-card p-6">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="analysis-icon">
                            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                            </svg>
                        </div>
                        <h2 class="text-xl font-space font-bold text-white">AI-Generated Insights</h2>
                    </div>
                    <div id="aiInsights" class="text-gray-300 leading-relaxed"></div>
                </div>

                <!-- Key Relationships Section -->
                <div class="glass-card p-6">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="analysis-icon bg-gradient-to-br from-purple-500 to-pink-500">
                            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                            </svg>
                        </div>
                        <h2 class="text-xl font-space font-bold text-white">Key Relationships</h2>
                    </div>
                    <div id="relationships" class="space-y-3"></div>
                </div>

                <!-- District Comparison -->
                <div class="glass-card p-6">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="analysis-icon bg-gradient-to-br from-blue-500 to-cyan-500">
                            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/>
                            </svg>
                        </div>
                        <h2 class="text-xl font-space font-bold text-white">District-wise Analysis</h2>
                    </div>
                    <div id="districtComparison"></div>
                </div>

                <!-- Key Metrics Grid -->
                <div class="grid md:grid-cols-4 gap-4" id="metricsGrid"></div>

                <!-- Map and Charts Row -->
                <div class="grid md:grid-cols-2 gap-6">
                    <!-- City Map -->
                    <div class="glass-card p-6">
                        <h3 class="text-lg font-space font-semibold mb-4 text-white">City Heat Map</h3>
                        <div id="cityMap" style="height: 300px; border-radius: 12px;"></div>
                    </div>

                    <!-- Temperature Chart -->
                    <div class="glass-card p-6">
                        <h3 class="text-lg font-space font-semibold mb-4 text-white">Temperature Trends</h3>
                        <div style="height: 300px; position: relative;">
                            <canvas id="tempChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Analysis Sections -->
                <div id="analysisContainer" class="space-y-6"></div>

                <!-- Data Tables -->
                <div class="glass-card p-6">
                    <h3 class="text-lg font-space font-semibold mb-4 text-white">Seasonal Data Summary</h3>
                    <div id="dataTable" class="overflow-x-auto"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
