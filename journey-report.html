<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journey Report - Urban Seasonal Intelligence System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="font-inter smooth-scroll">
    <!-- Animated Background -->
    <div class="fixed inset-0 -z-10 overflow-hidden bg-[#0a0a0f]">
        <div class="stars"></div>
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <!-- Header -->
    <header class="fixed top-0 w-full z-50 glass-header">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="journey.html" class="text-gray-400 hover:text-purple-400 transition-colors">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                </a>
                <div>
                    <h1 class="text-xl font-space font-bold text-white">Journey Report</h1>
                    <p class="text-sm text-gray-400" id="journeyRoute">Loading...</p>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="pt-24 px-6 pb-12">
        <div class="max-w-7xl mx-auto">
            <!-- Journey Info -->
            <div class="glass-card p-6 mb-6">
                <div class="grid md:grid-cols-4 gap-4">
                    <div class="route-info-card">
                        <div class="route-icon">
                            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                            </svg>
                        </div>
                        <div>
                            <div class="text-sm text-gray-400">Date & Time</div>
                            <div class="text-white font-semibold" id="journeyDateTime">Loading...</div>
                        </div>
                    </div>
                    <div class="route-info-card">
                        <div class="route-icon">
                            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                            </svg>
                        </div>
                        <div>
                            <div class="text-sm text-gray-400">Starting Point</div>
                            <div class="text-white font-semibold" id="startPoint">Loading...</div>
                        </div>
                    </div>
                    <div class="route-info-card">
                        <div class="route-icon">
                            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/>
                            </svg>
                        </div>
                        <div>
                            <div class="text-sm text-gray-400">Destination</div>
                            <div class="text-white font-semibold" id="endPoint">Loading...</div>
                        </div>
                    </div>
                    <div class="route-info-card">
                        <div class="route-icon">
                            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                        </div>
                        <div>
                            <div class="text-sm text-gray-400">ETA & Distance</div>
                            <div class="text-white font-semibold" id="etaInfo">Calculating...</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Route Map -->
            <div class="glass-card p-6 mb-6" style="position: relative;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <h3 class="text-lg font-space font-semibold text-white">Route Overview</h3>
                    <button id="reportTrafficBtn" class="report-traffic-btn">
                        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                        </svg>
                        Report Traffic
                    </button>
                </div>
                <div id="routeMap" style="height: 400px; border-radius: 12px;"></div>
                
                <!-- Traffic Reports Display -->
                <div id="trafficReportsDisplay" style="margin-top: 12px;"></div>
            </div>

            <!-- Destination Analysis -->
            <div id="destinationAnalysis"></div>
        </div>
    </main>

    <!-- Traffic Report Modal -->
    <div id="trafficReportModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="text-xl font-space font-bold text-white">Report Traffic Conditions</h3>
                <button id="closeModalBtn" class="close-modal-btn">
                    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            
            <div class="modal-body">
                <p class="text-gray-400 mb-6">Help other travelers by reporting current traffic conditions on this route.</p>
                
                <!-- Time Selection -->
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-300 mb-3">When did you experience this traffic?</label>
                    <div class="time-option-group">
                        <label class="time-option">
                            <input type="radio" name="timeOption" value="current" checked>
                            <div class="time-option-card">
                                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                </svg>
                                <span>Current Time</span>
                            </div>
                        </label>
                        <label class="time-option">
                            <input type="radio" name="timeOption" value="custom">
                            <div class="time-option-card">
                                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                </svg>
                                <span>Custom Time</span>
                            </div>
                        </label>
                    </div>
                </div>
                
                <!-- Custom Time Input -->
                <div id="customTimeInput" class="mb-6 hidden">
                    <label class="block text-sm font-semibold text-gray-300 mb-2">Select Date & Time</label>
                    <input type="datetime-local" id="customDateTime" class="custom-datetime-input">
                </div>
                
                <!-- Traffic Severity -->
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-300 mb-3">Traffic Severity</label>
                    <div class="severity-options">
                        <label class="severity-option">
                            <input type="radio" name="severity" value="light" checked>
                            <div class="severity-card light">
                                <div class="severity-indicator"></div>
                                <span>Light</span>
                            </div>
                        </label>
                        <label class="severity-option">
                            <input type="radio" name="severity" value="moderate">
                            <div class="severity-card moderate">
                                <div class="severity-indicator"></div>
                                <span>Moderate</span>
                            </div>
                        </label>
                        <label class="severity-option">
                            <input type="radio" name="severity" value="heavy">
                            <div class="severity-card heavy">
                                <div class="severity-indicator"></div>
                                <span>Heavy</span>
                            </div>
                        </label>
                    </div>
                </div>
                
                <!-- Submit Button -->
                <button id="submitTrafficReport" class="submit-report-btn">
                    Submit Report
                </button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="jreport.js"></script>
    
    <!-- Support Button -->
    <div class="support-button" id="supportButton">
        <svg width="28" height="28" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
    </div>
    
    <div class="support-menu" id="supportMenu">
        <a href="ticket-system.html" class="support-menu-item">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
            <span>Report Issue</span>
        </a>
        <a href="ticket-system.html" class="support-menu-item">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
            </svg>
            <span>Track Ticket</span>
        </a>
    </div>
    
    <script>
        // Support button toggle
        document.getElementById('supportButton').addEventListener('click', () => {
            document.getElementById('supportMenu').classList.toggle('active');
        });
        
        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            const button = document.getElementById('supportButton');
            const menu = document.getElementById('supportMenu');
            if (!button.contains(e.target) && !menu.contains(e.target)) {
                menu.classList.remove('active');
            }
        });
    </script>
</body>
</html>
